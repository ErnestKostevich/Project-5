<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ContentLoop">
  <defs>
    <linearGradient id="cl-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#cl-grad)"/>
  <!-- Looping arrow: half-circle on the left + open arrow head on the right -->
  <path
    d="M 44 18 A 14 14 0 1 0 44 46"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
  />
  <path
